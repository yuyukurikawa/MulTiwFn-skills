  </defs>
  <rect width="900" height="180" fill="none"/>
  <g filter="url(#soft-shadow)" font-family="Avenir Next, Inter, Helvetica Neue, Arial, sans-serif" font-size="118" font-weight="800" letter-spacing="0">
